name: Repair Hostinger Root

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate repair secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          [ -n "$FTP_SERVER" ] || { echo "Missing secret: FTP_SERVER"; exit 1; }
          [ -n "$FTP_USERNAME" ] || { echo "Missing secret: FTP_USERNAME"; exit 1; }
          [ -n "$FTP_PASSWORD" ] || { echo "Missing secret: FTP_PASSWORD"; exit 1; }

      - name: Download WordPress htaccess backup
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ftp:use-feat false;
            set cmd:fail-exit true;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            cd /public_html;
            get .htaccess.bk -o /tmp/wp-htaccess.bk;
          "
          test -s /tmp/wp-htaccess.bk

      - name: Clean mistaken landing files from public_html root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ftp:use-feat false;
            set cmd:fail-exit true;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            cd /public_html;
            put /tmp/wp-htaccess.bk -o .htaccess;
            rm -f 404.html icon.png index.html index.txt .DS_Store;
            rm -rf _next icons images;
            ls;
          "
