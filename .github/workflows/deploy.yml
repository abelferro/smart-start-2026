name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          [ -n "$FTP_SERVER" ] || { echo "Missing secret: FTP_SERVER"; exit 1; }
          [ -n "$FTP_USERNAME" ] || { echo "Missing secret: FTP_USERNAME"; exit 1; }
          [ -n "$FTP_PASSWORD" ] || { echo "Missing secret: FTP_PASSWORD"; exit 1; }
          [ -n "$FTP_DIR" ] || { echo "Missing secret: FTP_DIR"; exit 1; }
          case "$FTP_DIR" in
            */lp/smart-start-2026|*/lp/smart-start-2026/) ;;
            *) echo "FTP_DIR must point to the WordPress-safe subfolder: /lp/smart-start-2026/"; exit 1 ;;
          esac

      - name: Deploy to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ftp:use-feat false;
            set cmd:fail-exit true;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            cd $FTP_DIR;
            mirror --reverse --verbose --use-pget-n=4 ./out/ .;
          "
